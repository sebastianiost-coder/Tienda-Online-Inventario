services:
  db:
    image: postgres:16-alpine
    container_name: tienda_inventario_db
    environment:
      POSTGRES_DB: tienda_inventario
      POSTGRES_USER: tienda_user
      POSTGRES_PASSWORD: tienda_password
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tienda_user -d tienda_inventario"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    container_name: tienda_inventario_api
    environment:
      NODE_ENV: development
      PORT: 8088
      DATABASE_URL: postgres://tienda_user:tienda_password@db:5432/tienda_inventario
      JWT_SECRET: local-dev-secret-change-me
      CORS_ORIGIN: http://localhost:5179
    ports:
      - "8088:8088"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
    command: npm run dev

  client:
    build:
      context: ./client
    container_name: tienda_inventario_client
    environment:
      VITE_API_URL: http://localhost:8088/api
    ports:
      - "5179:5179"
    depends_on:
      - api
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
