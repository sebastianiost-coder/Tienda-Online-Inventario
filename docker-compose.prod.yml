services:
  db:
    image: postgres:16-alpine
    container_name: tienda_inventario_db_prod
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tienda_inventario}
      POSTGRES_USER: ${POSTGRES_USER:-tienda_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_db_password}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tienda_user} -d ${POSTGRES_DB:-tienda_inventario}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    container_name: tienda_inventario_api_prod
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: production
      PORT: 8088
      DATABASE_URL: postgres://${POSTGRES_USER:-tienda_user}:${POSTGRES_PASSWORD:-change_me_db_password}@db:5432/${POSTGRES_DB:-tienda_inventario}
      JWT_SECRET: ${JWT_SECRET:-change_me_jwt_secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    command: npm start

  web:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: tienda_inventario_web_prod
    depends_on:
      - api
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    container_name: tienda_inventario_proxy_prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8091}:80"
      - "${HTTPS_PORT:-8451}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data_prod:/data
      - caddy_config_prod:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data_prod:
  caddy_data_prod:
  caddy_config_prod:
